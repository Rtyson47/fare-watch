name: corridors

# Corridor watchlist + deadline watches — twice per day.
# NOTE: runs Tier 1 only until Duffel is enabled. To turn on paid Tier 2
# verification, remove `--tier1-only` below AND set config `duffel.live_confirmed: true`
# AND add `DUFFEL_ENABLE_LIVE: "1"` to the env. (Duffel live mode is billed.)
on:
  schedule:
    - cron: "0 6,18 * * *"     # 06:00 and 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fare-watch-data
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - name: Run corridors + deadline watches
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          TP_MARKER: ${{ secrets.TP_MARKER }}
          DUFFEL_API_KEY: ${{ secrets.DUFFEL_API_KEY }}
          # DUFFEL_ENABLE_LIVE: "1"   # <-- uncomment ONLY after confirming billing
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py run --tier1-only --corridors-only
      - name: Commit data back
        run: |
          git config user.name "fare-watch-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fare_watch.db docs/data.json
          git diff --staged --quiet || git commit -m "chore: corridors run $(date -u +%FT%TZ)"
          git pull --rebase
          git push
