current_base: MEX

defaults:
  market: us
  currency: usd

corridors:
  - origin: "{BASE}"
    destination: YYZ
    date_windows: ["2026-09-01:2026-09-30"]   # any day in the month, one-way
    trip_type: one_way
    cabin: economy
    max_price: 350                     # estimate — adjust once you see real fares
    currency: usd
    alert_threshold: 250
    flex_days: 3

  - origin: YVR
    destination: LHR
    date_windows: ["2026-09-01:2026-09-30"]   # any day in the month, one-way
    trip_type: one_way
    cabin: economy
    max_price: 700                     # estimate — adjust once you see real fares
    currency: usd
    alert_threshold: 550
    flex_days: 3

deadline_watches:
  - destination: LHR                   # one-way, back in London on or before the date
    origin: "{BASE}"                   # optional; defaults to current_base
    earliest_depart: "2026-07-24"       # don't search/alert on departures before this
    must_arrive_by: "2026-07-27"
    max_price: 650
    currency: usd

  - destination: MAN                   # "get me home to Manchester by X, under Y"
    origin: "{BASE}"                   # optional; defaults to current_base
    must_arrive_by: "2026-12-24"
    max_price: 650
    currency: usd

inspiration:
  origins: ["{BASE}"]
  horizon_weeks: 8
  price_ceiling: 450
  currency: usd
  market: us
  region_whitelist: []                 # [] = anywhere; else [US, MX, GB] or explicit [BKK, MAD]
  top_n_to_verify: 10

cost_guardrails:
  max_duffel_searches_per_day: 100
  duffel_cost_per_search_usd: 0.005

alerting:
  telegram: {enabled: true}
  smtp: {enabled: false}
  digest_mode: false
  median_lookback_days: 30
  median_alert_ratio: 0.80             # alert if price < 80% of trailing median
  median_min_samples: 5
  dedupe_window_hours: 24
  dedupe_band_width: 20                 # currency-unit width of a dedupe price band

# Tier 2 (Duffel) live-mode double gate. Leave false until you confirm billing.
duffel:
  live_confirmed: false

awards:
  enabled: false                       # seats.aero Pro award-space module (optional, Phase 2)
