<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fare-watch dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 1.5rem;
         max-width: 1000px; margin-inline: auto; line-height: 1.4; }
  h1 { font-size: 1.4rem; margin: 0 0 .2rem; }
  .muted { color: #777; font-size: .85rem; }
  .grid { display: grid; gap: 1.5rem; grid-template-columns: 1fr; }
  .card { border: 1px solid rgba(128,128,128,.3); border-radius: 10px; padding: 1rem; }
  .card h2 { font-size: 1.05rem; margin: 0 0 .6rem; }
  table { border-collapse: collapse; width: 100%; font-size: .9rem; }
  th, td { text-align: left; padding: .35rem .5rem; border-bottom: 1px solid rgba(128,128,128,.2); }
  .pill { display: inline-block; padding: .1rem .5rem; border-radius: 999px;
          background: rgba(60,140,90,.15); color: #2e7d4f; font-weight: 600; }
  a { color: #2f6fed; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .overflow { overflow-x: auto; }
  canvas { max-width: 100%; }
</style>
</head>
<body>
  <h1>fare-watch <span id="base" class="pill"></span></h1>
  <div class="muted" id="generated"></div>

  <div class="grid" style="margin-top:1.5rem">
    <div class="card">
      <h2>Corridor price history</h2>
      <div id="charts"></div>
    </div>

    <div class="card">
      <h2>Current cheapest (corridors)</h2>
      <div class="overflow"><table id="cheapest">
        <thead><tr><th>Route</th><th>Cheapest</th><th>Carrier</th><th>Depart</th><th>Threshold</th><th></th></tr></thead>
        <tbody></tbody></table></div>
    </div>

    <div class="card">
      <h2>Deadline watches (one-way)</h2>
      <div class="overflow"><table id="deadlines">
        <thead><tr><th>Route</th><th>Cheapest</th><th>Depart</th><th>Arrive by</th><th>Max price</th><th></th></tr></thead>
        <tbody></tbody></table></div>
    </div>

    <div class="card">
      <h2>Inspiration shortlist</h2>
      <div class="overflow"><table id="inspiration">
        <thead><tr><th>Route</th><th>Price</th><th>Depart</th><th></th></tr></thead>
        <tbody></tbody></table></div>
    </div>

    <div class="card">
      <h2>Duffel spend this month</h2>
      <p id="spend" style="font-size:1.2rem;margin:.2rem 0"></p>
      <div class="muted">Estimated at $0.005 / verification search.</div>
    </div>
  </div>

<script>
const fmt = n => (n == null ? "—" : "$" + Number(n).toLocaleString(undefined, {maximumFractionDigits:0}));
const esc = s => String(s ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
const fmtDate = s => {
  if (!s) return "";
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(s);
  return m ? `${m[3]}-${m[2]}-${m[1].slice(2)}` : s;
};

fetch("data.json").then(r => r.json()).then(d => {
  document.getElementById("base").textContent = d.base || "";
  document.getElementById("generated").textContent = "Generated " + (d.generated_at || "");

  // charts
  const charts = document.getElementById("charts");
  (d.corridors || []).forEach((c, i) => {
    const wrap = document.createElement("div");
    wrap.style.marginBottom = "1.2rem";
    wrap.innerHTML = `<div class="muted">${esc(c.route)}</div><canvas id="c${i}" height="90"></canvas>`;
    charts.appendChild(wrap);
    const labels = (c.history || []).map(h => fmtDate(h.date));
    const prices = (c.history || []).map(h => h.min_price);
    const thr = c.threshold;
    new Chart(document.getElementById("c"+i), {
      type: "line",
      data: { labels, datasets: [
        { label: "min price", data: prices, borderColor: "#2f6fed", tension: .25, spanGaps: true },
        { label: "threshold", data: labels.map(() => thr), borderColor: "#e0704f",
          borderDash: [6,4], pointRadius: 0 }
      ]},
      options: { plugins: { legend: { display: true } },
                 scales: { y: { beginAtZero: false } } }
    });
  });
  if (!(d.corridors || []).length) charts.innerHTML = '<div class="muted">No corridor history yet.</div>';

  // cheapest table
  const cb = document.querySelector("#cheapest tbody");
  (d.corridors || []).forEach(c => {
    const ch = c.current_cheapest || {};
    const link = ch.deep_link ? `<a href="${esc(ch.deep_link)}" target="_blank" rel="noopener">book ↗</a>` : "";
    cb.insertAdjacentHTML("beforeend",
      `<tr><td>${esc(c.route)}</td><td>${fmt(ch.price)}</td><td>${esc(ch.carrier)||"—"}</td>
       <td>${fmtDate(ch.depart_date)||"—"}</td><td>${fmt(c.threshold)}</td><td>${link}</td></tr>`);
  });

  // deadline watches table
  const db_ = document.querySelector("#deadlines tbody");
  (d.deadline_watches || []).forEach(w => {
    const ch = w.current_cheapest || {};
    const link = ch.deep_link ? `<a href="${esc(ch.deep_link)}" target="_blank" rel="noopener">book ↗</a>` : "";
    db_.insertAdjacentHTML("beforeend",
      `<tr><td>${esc(w.route)}</td><td>${fmt(ch.price)}</td>
       <td>${fmtDate(ch.depart_date)||"—"}</td><td>${fmtDate(w.must_arrive_by)||"—"}</td>
       <td>${fmt(w.max_price)}</td><td>${link}</td></tr>`);
  });
  if (!(d.deadline_watches || []).length)
    db_.innerHTML = '<tr><td colspan="6" class="muted">No deadline watches configured.</td></tr>';

  // inspiration table
  const ib = document.querySelector("#inspiration tbody");
  (d.inspiration || []).forEach(i => {
    const link = i.deep_link ? `<a href="${esc(i.deep_link)}" target="_blank" rel="noopener">book ↗</a>` : "";
    ib.insertAdjacentHTML("beforeend",
      `<tr><td>${esc(i.origin)}-${esc(i.destination)}</td><td>${fmt(i.price)}</td>
       <td>${fmtDate(i.depart_date)||"—"}</td><td>${link}</td></tr>`);
  });

  // spend
  const s = d.spend_this_month || {searches:0, est_cost_usd:0};
  document.getElementById("spend").textContent =
    `${s.searches} searches · ~$${Number(s.est_cost_usd).toFixed(2)}`;
}).catch(e => {
  document.body.insertAdjacentHTML("beforeend",
    `<p class="muted">Could not load data.json (${e}). Serve via GitHub Pages or a local web server.</p>`);
});
</script>
</body>
</html>
